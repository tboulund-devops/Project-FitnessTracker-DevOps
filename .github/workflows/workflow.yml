name: workflow.yml
on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # ----- SEMANTIC VERSIONING -----
      - name: Application Version
        id: semver-app
        uses: paulhatch/semantic-version@v5.4.0
        with:
          bump_each_commit: true # Increments on every commit

          major_pattern: "(MAJOR)"
          minor_pattern: "(MINOR)"
          bump_each_commit_patch_pattern: "(PATCH)"

      - name: Display Version
        run: echo "Generated version is ${{ steps.semver-app.outputs.version }}"

      # Install required tools
      - name: Install required tools
        run: |
          dotnet tool install -g dotnet-stryker
          dotnet tool install -g dotnet-sonarscanner
          dotnet tool install -g dotnet-reportgenerator-globaltool

      # SonarCloud begin
      - name: Start Static Code Analysis
        run: |
          dotnet sonarscanner begin \
          /k:"${{ vars.PROJECT_KEY }}" \
          /d:sonar.host.url="${{ vars.SONAR_URL }}" \
          /d:sonar.token="${{ secrets.FITNESSTRACKERTOKEN }}" \
          /d:sonar.projectBaseDir="$(pwd)" \
          /d:sonar.coverageReportPaths="sonarqube-coverage-report/SonarQube.xml" \
          /d:sonar.javascript.lcov.reportPaths="Tests/Frontend-UnitTests/coverage/lcov.info" \
          /d:sonar.qualitygate.wait=true \
          /d:sonar.qualitygate.timeout=300

      # Build
      - name: Build
        if: always()
        run: dotnet build Project-FitnessTracker-DevOps.sln

      # Unit tests with coverage
      - name: Run unit tests with coverage
        if: always()
        timeout-minutes: 25
        run: |
          dotnet test Tests/Tests.csproj \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults \
            --logger "trx;LogFileName=test_results.trx" \
            --blame-hang \
            --blame-hang-timeout 5m \
            --diag TestResults/dotnet-test-diag.log \
            --verbosity normal

      - name: Install Node.js for frontend tests
        if: always()
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        if: always()
        working-directory: ./Tests/Frontend-UnitTests/
        run: npm install

      - name: Run Frontend Tests with Coverage
        if: always()
        working-directory: ./Tests/Frontend-UnitTests/
        run: |
          npm run coverage
          # Normalize lcov source paths so Sonar resolves files under Frontend/src.
          sed -i -E 's#^SF:\.\./\.\./Frontend/#SF:Frontend/#; s#^SF:\.\.\\\.\.\\Frontend\\#SF:Frontend/#; s#\\#/#g' coverage/lcov.info
          grep '^SF:' coverage/lcov.info | head -n 20

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**
          if-no-files-found: warn

      # Convert coverage to SonarQube format
      - name: Convert coverage to SonarQube format
        if: always()
        run: |
          COVERAGE_FILE=$(find TestResults -name "coverage.cobertura.xml" | head -n 1)
          echo "Found coverage file: $COVERAGE_FILE"
          if [ -f "$COVERAGE_FILE" ]; then
            mkdir -p sonarqube-coverage-report
            reportgenerator \
              -reports:"$COVERAGE_FILE" \
              -targetdir:"sonarqube-coverage-report" \
              -reporttypes:SonarQube
            echo "✅ Coverage file converted to SonarQube format"
          else
            echo "❌ No coverage file found!"
            exit 1
          fi

      # SonarQube end
      - name: Complete Static Code Analysis
        if: always()
        run: |
          dotnet sonarscanner end \
          /d:sonar.token="${{ secrets.FITNESSTRACKERTOKEN }}"

      # Mutation tests
      - name: Run Mutation Tests
        if: always()
        working-directory: ./Tests
        run: dotnet stryker --project Backend.csproj --break-at 60 --output "stryker-report"

      # ===== DOCKER BUILD & PUSH TO Github Container Repository =====
      - name: Convert repository name to lowercase
        if: always()
        id: repo_lower
        run: echo "repo_lower=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        if: always()
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Docker image
        if: always()
        run: |
          docker build \
            -t ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}:staging \
            -f Backend/Dockerfile \
            .
          docker push ghcr.io/${{ steps.repo_lower.outputs.repo_lower }} --all-tags

      - name: Build and Push Frontend Docker image
        if: always()
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=http://${{ vars.STAGING_SERVER_IP }}:8081 \
            -t ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}-frontend:staging \
            -f Frontend/Dockerfile \
            Frontend/
          docker push ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}-frontend --all-tags
      
      # ===== DEPLOY TO STAGING SERVER =====
      - name: Ensure target directory exists and is writable
        if: always()
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ vars.STAGING_SERVER_IP }}
          username: ${{ vars.STAGING_SERVER_USERNAME }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            mkdir -p dowa
            echo '${{ secrets.SUDO_PASSWORD }}' | sudo -S chown -R $(whoami) dowa

      - name: Deliver Docker Compose file and migrations to staging
        if: always()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.STAGING_SERVER_IP }}
          username: ${{ vars.STAGING_SERVER_USERNAME }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          source: "docker-compose.staging.yml,db/migrations/*.sql"
          target: dowa/
          rm: false

      - name: Create .env file on staging server
        if: always()
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ vars.STAGING_SERVER_IP }}
          username: ${{ vars.STAGING_SERVER_USERNAME }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            cd dowa
            echo "DATABASE_USER=${{ vars.DATABASE_USER }}" > .env
            echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" >> .env
            echo "DATABASE_NAME=${{ vars.DATABASE_NAME }}" >> .env
            echo "CONNECTION_STRING=Host=db;Database=${{ vars.DATABASE_NAME }};Username=${{ vars.DATABASE_USER }};Password=${{ secrets.DATABASE_PASSWORD }}" >> .env
            echo "ASPNETCORE_ENVIRONMENT=Staging" >> .env
            # Add any runtime frontend variables if needed (e.g., for a config.js)
            # echo "REACT_APP_API_URL=http://${{ vars.STAGING_SERVER_IP }}:8081" >> .env
  
      - name: Run Docker Compose on staging server
        if: always()
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ vars.STAGING_SERVER_IP }}
          username: ${{ vars.STAGING_SERVER_USERNAME }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            cd dowa
            
            # Function to run commands with sudo (no password prompt)
            function run_sudo
              echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S -p '' $argv
            end
            
            # Log in to GHCR
            run_sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}
            
            # Stop and remove containers, then pull fresh images
            run_sudo docker compose -f docker-compose.staging.yml down
            # Force removal of old images to ensure fresh pull
            run_sudo docker rmi ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}:staging ghcr.io/${{ steps.repo_lower.outputs.repo_lower }}-frontend:staging 2>/dev/null || true
            
            run_sudo docker compose -f docker-compose.staging.yml pull 
            
            # Start database
            run_sudo docker compose -f docker-compose.staging.yml up -d db
            
            echo "Waiting for database to be healthy..."
            while test (run_sudo docker inspect --format='{{.State.Health.Status}}' FitnessTrackerDBPost) != "healthy"
              sleep 2
            end
            
            # Flyway validation and migration
            echo "Running Flyway validation..."
            set flyway_validate_output (run_sudo docker compose -f docker-compose.staging.yml run --rm flyway validate 2>&1)
            set flyway_validate_exit $status
            
            if test $flyway_validate_exit -ne 0
              echo "$flyway_validate_output"
              if string match -rqi "Migration checksum mismatch|checksum mismatch" -- "$flyway_validate_output"
                echo "Checksum mismatch detected. Running one-time Flyway repair..."
                if not run_sudo docker compose -f docker-compose.staging.yml run --rm flyway repair
                  echo "❌ Flyway repair failed!"
                  exit 1
                end
              else
                echo "❌ Flyway validation failed for a non-checksum reason."
                exit $flyway_validate_exit
              end
            end
            
            echo "Running Flyway migrate..."
            if not run_sudo docker compose -f docker-compose.staging.yml run --rm flyway migrate
              echo "❌ Flyway migration failed!"
              exit 1
            end
            
            # Start backend and frontend
            echo "Starting backend..."
            run_sudo docker compose -f docker-compose.staging.yml up -d backend
            echo "Starting frontend..."
            run_sudo docker compose -f docker-compose.staging.yml up -d frontend
      
      # ===== WAIT FOR APP TO BE READY =====
      - name: Wait for Backend to be Ready
        if: always()
        run: |
          MAX_ATTEMPTS=30
          URL="http://${{ vars.STAGING_SERVER_IP }}:8081/api/workout/APIWorkout/GetWorkoutInformation/1"
          echo "Waiting for backend at $URL"
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_STATUS=$(curl -4 -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$URL" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Backend is up! (HTTP 200)"
              break
            else
              echo "Attempt $i/$MAX_ATTEMPTS: HTTP $HTTP_STATUS - not ready yet. Sleeping 5s..."
            fi
            sleep 5
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Backend did not become ready in time. Last HTTP status: $HTTP_STATUS"
            exit 1
          fi

      - name: Verify Frontend is Serving
        if: always()
        run: |
          FRONTEND_URL="http://${{ vars.STAGING_SERVER_IP }}:8030"
          curl -f -s -o /dev/null "$FRONTEND_URL" || (echo "❌ Frontend not reachable" && exit 1)
          echo "✅ Frontend is reachable"
          
      # ===== WAIT FOR APP TO BE READY =====
      - name: Wait for Staging to be Ready
        if: always()
        run: |
          MAX_ATTEMPTS=30
          URL="http://${{ vars.STAGING_SERVER_IP }}:8081/api/workout/APIWorkout/GetWorkoutInformation/1"
          echo "Waiting for app at $URL"
          for i in $(seq 1 $MAX_ATTEMPTS); do
            HTTP_STATUS=$(curl -4 -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "$URL" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ App is up! (HTTP 200)"
              exit 0
            else
              echo "Attempt $i/$MAX_ATTEMPTS: HTTP $HTTP_STATUS - not ready yet. Sleeping 5s..."
            fi
            sleep 5
          done
          echo "❌ App did not become ready in time. Last HTTP status: $HTTP_STATUS"
          exit 1

      # ===== Frontend Build ===== for E2E and Performance tests via github container registry and actions
      - name: Install Frontend Dependencies for Build
        if: always()
        working-directory: ./Frontend/
        run: npm ci

      - name: Build Frontend
        if: always()
        working-directory: ./Frontend/
        run: npm run build

      # ===== PERFORMANCE TEST WITH K6 =====
      - name: Install k6
        if: always()
        run: |
          curl -L -O https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz
          tar -xzf k6-v0.54.0-linux-amd64.tar.gz
          sudo mv k6-v0.54.0-linux-amd64/k6 /usr/local/bin/
          k6 version

      - name: Run Performance Test (k6)
        if: always()
        working-directory: ./Tests
        env:
          TARGET_URL: "http://${{ vars.STAGING_SERVER_IP }}:8081/api/workout/APIWorkout/GetWorkoutInformation/1"
        run: |
          k6 run K6Testing.js -e TARGET_URL="$TARGET_URL" --summary-export=k6-summary.json

      # ===== E2E TESTING =====
      - name: Install TestCafe
        if: always()
        run: npm install -g testcafe testcafe-reporter-html

      - name: Run E2E Tests
        if: always()
        working-directory: ./Tests
        run: testcafe chrome:headless E2ETest.js --reporter html:e2e-report.html

      # ===== UPLOAD REPORTS =====
      - name: Collect Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: Tests/stryker-report/reports/mutation-report.html

      - name: Upload k6 Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: Tests/k6-summary.json

      - name: Collect E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: Tests/e2e-report.html
